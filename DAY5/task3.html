<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <link rel="stylesheet" href="task3.css">
</head>
<body>
    <section class="container">
        <h1>Contact Us</h1>
        <form>
            <div class="grid-two">
                <div class="field">
                    <label for="first-name">First Name <span>*</span></label>
                    <input type="text" id="first-name" name="first-name" placeholder="" required>
                </div>
                <div class="field">
                    <label for="last-name">Last Name <span>*</span></label>
                    <input type="text" id="last-name" name="last-name" placeholder="" required>
                </div>
                <div class="field full-width">
                    <label for="email">Email Address <span>*</span></label>
                    <input type="email" id="email" name="email" placeholder="" required>
                </div>
                <div class="field full-width">
                    <label>Query Type <span>*</span></label>
                    <div class="query-options">
                        <div class="option">
                            <input type="radio" id="general" name="query" value="general" required>
                            <label for="general">General Enquiry</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="support" name="query" value="support" required>
                            <label for="support">Support Request</label>
                        </div>
                    </div>
                </div>
                <div class="field full-width">
                    <label for="message">Message <span>*</span></label>
                    <textarea id="message" name="message" placeholder="" required></textarea>
                </div>
            </div>
            <label class="consent">
                <input type="checkbox" required>
                I consent to being contacted by the team <span>*</span>
            </label>
            <div class="submit-row">
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>
    </section>
</body>
</html>
