<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="task4.css">
</head>
<body>
    <article class="card">
        <div class="avatar">
            <img src="My_Pic.jpg" alt="Profile avatar">
        </div>
        <h1 class="name">Sai Sampath Kumar</h1>
        <div class="location">Andhra Pradesh, India</div>
        <p class="quote">"Java Full Stack developer."</p>
        <div class="links">
            <a href="#">GitHub</a>
            <a href="#">Frontend Mentor</a>
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
        </div>
    </article>
</body>
</html>
