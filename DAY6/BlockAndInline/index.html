<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <span>Hii</span>
    <span>Good Morning(By default span is inline but we can convert it into block level by css display property)</span><br>
    <div>
        Div is block level Element
    </div>
    <div>
        We can convert it into inline (we cannot apply height and width in inline level element)
    </div>
</body>
</html>
