<!doctype html>
<html lang="en">
  <head>
    <style>
      table {
        border-collapse: collapse;
        width: 300px;
        height: 200px;
      }
      tfoot{
        text-align-last: center;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <table border="3">
      <tr>
        <th rowspan="2"></th>
        <th colspan="2">Average</th>
        <th rowspan="2">Red Eyes</th>
      </tr>
      <tr>
        <th>height</th>
        <th>weight</th>
      </tr>
      <tr>
        <th>Males</th>
        <td>1.9</td>
        <td>0.003</td>
        <td>40%</td>
      </tr>
      <tr>
        <th>Females</th>
        <td>1.7</td>
        <td>0.002</td>
        <td>43%</td>
      </tr>
      <tr>
      <tfoot>
        <td colspan="4">Total Rows 4</td>
      </tfoot>
      </tr>
    </table>
  </body>
</html>
