<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Index</title>
    <style>
        #main{
            display: flex;
        }
        #b1{
            width: 100px;
            height: 100px;
            background-color: red;
        }
        #b2{
            width: 100px;
            height: 100px;
            background-color: green;
        }
        #b3{
            width: 100px;
            height: 100px;
            background-color: blue;
        }
    </style>
</head>
<body>

    <div id="main">
        <div tabindex="2" id="b1">BOX1</div>
        <br>
        <div tabindex="1" id="b2">BOX2</div>
        <br>
        <div tabindex="3" id="b3">BOX3</div>
    </div>
    <h1 draggable="true"> Content Draggable</h1>
    <p  contenteditable="true">Content Editable</p>
</body>
</html>
