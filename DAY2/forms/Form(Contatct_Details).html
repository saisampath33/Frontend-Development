<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        #head{
            text-align: center;
        }
        #head {
            width: 400px;
            margin: 50px auto;        
            padding: 20px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h2 style="text-align: center; height: 9px;">Contact Details</h2>
    <div id="head">
    <h3 style="text-align: left;">Please enter your personal details: </h3>
    <tr>
        <td>First name*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Last name*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Street address*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Town City*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Postcode Zip*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Telephone*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Mobile*</td>
        <td><input type="text"></td>
        <br><br>
    </tr>
    <tr>
        <td>Email address*</td>
        <td><input type="text"></td>
        <br>
    </tr>
    <p>Feilds marked * are required</p>
    <button type="submit">Submit</button>
    </div>
</body>
</html>
